# pytest.ini
[pytest]
# Test discovery rules
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Register custom markers
markers =
    smoke: quick checks for critical functionality
    regression: full suite for stable features
    order: control execution order
    dependency: declare test dependencies

# Logging options
log_cli = true
log_cli_level = INFO