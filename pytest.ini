# ========================================
# CredKart E2E Testing Framework
# pytest Configuration
# ========================================

[pytest]

# ========================================
# Test Discovery Configuration
# ========================================
# Specify the directories where pytest should look for tests
testpaths = tests
# Pattern for test files - matches files starting with 'test_' and ending with '.py'
python_files = test_*.py
# Pattern for test classes - matches classes starting with 'Test'
python_classes = Test*
# Pattern for test functions - matches functions starting with 'test_'
python_functions = test_*

# ========================================
# Custom Markers Registration
# ========================================
# Markers help organize and filter tests by their characteristics
# Usage: @pytest.mark.marker_name
# Run: pytest -m marker_name (run tests with marker)
#      pytest -m "not marker_name" (run tests without marker)
markers =
    # ====== Test Category Markers ======
    smoke: quick checks for critical functionality (URL, login sanity checks) - RECOMMENDED FOR CI
    sanity: basic functional tests before deeper testing (registration, login)
    regression: full suite for stable/existing features (all core functionality)
    integration: tests verifying multiple components work together (end-to-end flows)
    e2e: end-to-end workflow tests simulating complete user journey

    # ====== Severity & Priority Markers ======
    critical: critical path tests that block release if failed
    prerequisite: tests that create data for other tests (must run early)

    # ====== Functional Area Markers ======
    ui: user interface interaction and validation tests
    api: API endpoint tests (for future API automation)
    database: database operation tests (for future DB validation)

    # ====== Feature Category Markers ======
    user_management: tests related to user authentication and profile management
    authentication: login, logout, and authentication flow tests
    accessibility: tests for application accessibility and availability

    cart_management: tests related to shopping cart operations (add/remove items)
    product_management: tests related to product selection and catalog interaction

    wishlist_management: tests related to wishlist/saved items operations
    shopping: shopping-related tests (cart, wishlist, products)

    checkout: tests related to checkout process and order flow
    payment: tests related to payment processing and card handling
    purchase_flow: complete purchase journey from product to order
    user_journey: tests that simulate complete user workflows

    # ====== Data-Driven Testing Markers ======
    ddt: data-driven tests using external data sources
    data_driven: tests using parameterized or external data
    parametrize: pytest parameterized tests with multiple inputs
    parametrize_excel: parameterized tests with Excel data
    fixture_based: tests using pytest fixture parameterization
    data_factory: tests that generate and provide data for other tests

    # ====== Infrastructure Markers ======
    slow: tests that take a long time to execute (full checkout flows)
    cleanup: tests that clean up state (empty cart/wishlist)

    # ====== Pytest Internal Markers ======
    order: control test execution sequence (via pytest-order)
    dependency: declare test dependencies (via pytest-dependency)
    login: login and authentication related tests
    favorites: wishlist/favorites functionality tests
    critical_path: tests in the critical execution path that must pass
    state_management: tests verifying state transitions and consistency

    # ====== Custom Project Markers ======
    login_flow: complete login workflow tests
    product_addition: product selection and addition tests

# ========================================
# Logging Configuration
# ========================================
# Enable logging to the console during test execution
log_cli = true
# Set the logging level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
log_cli_level = INFO
# Format for log messages - shows timestamp, level, and message
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
# Timestamp format for log messages
log_cli_date_format = %Y-%m-%d %H:%M:%S

# ========================================
# Test Execution Options
# ========================================
# Show extra test summary info (passed, failed, skipped, xfailed, xpassed)
addopts = 
    -v --strict-markers --tb=short
# Stop on first failure (uncomment to enable)
# addopts = -x
