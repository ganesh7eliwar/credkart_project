# ========================================
# CredKart E2E Testing Framework
# pytest Configuration
# ========================================

[pytest]

# ========================================
# Test Discovery Configuration
# ========================================
# Specify the directories where pytest should look for tests
testpaths = tests
# Pattern for test files - matches files starting with 'test_' and ending with '.py'
python_files = test_*.py
# Pattern for test classes - matches classes starting with 'Test'
python_classes = Test*
# Pattern for test functions - matches functions starting with 'test_'
python_functions = test_*

# ========================================
# Custom Markers Registration
# ========================================
# Markers help organize and filter tests by their characteristics
markers =
    smoke: quick checks for critical functionality
    regression: full suite for stable features
    integration: tests that verify multiple components working together
    ui: user interface interaction tests
    api: API endpoint tests
    database: database operation tests
    slow: tests that take a long time to execute
    order: control execution order
    dependency: declare test dependencies

# ========================================
# Logging Configuration
# ========================================
# Enable logging to the console during test execution
log_cli = true
# Set the logging level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
log_cli_level = INFO
# Format for log messages - shows timestamp, level, and message
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
# Timestamp format for log messages
log_cli_date_format = %Y-%m-%d %H:%M:%S

# ========================================
# Test Execution Options
# ========================================
# Show extra test summary info (passed, failed, skipped, xfailed, xpassed)
addopts = 
    -v --strict-markers --tb=short
# Stop on first failure (uncomment to enable)
# addopts = -x
